services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: report_generate
      MYSQL_USER: report
      MYSQL_PASSWORD: report
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-proot']
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio12345 &&
      mc mb local/reports --ignore-existing &&
      mc anonymous set download local/reports || true;
      exit 0;
      "

  gotenberg:
    image: gotenberg/gotenberg:8
    ports:
      - '3030:3000'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      gotenberg:
        condition: service_started
    environment:
      DATABASE_URL: mysql://report:report@mysql:3306/report_generate
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: '9000'
      MINIO_USE_SSL: 'false'
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio12345
      MINIO_BUCKET: reports
      GOTENBERG_URL: http://gotenberg:3000
      HTTP_ALLOWLIST_HOSTS: '*'
      SCRIPT_TIMEOUT_MS: '12000'
      OPENAI_BASE_URL: https://api.openai.com/v1
      AI_MOCK_ENABLED: 'false'
      AI_DAILY_LIMIT: '100'
      PORT: '4000'
      CORS_ORIGIN: http://localhost:5173
    ports:
      - '4000:4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /api
    depends_on:
      - api
    ports:
      - '5173:80'

volumes:
  mysql_data:
  minio_data:
