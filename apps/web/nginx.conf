server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # pdf.js worker is emitted as *.mjs; default mime.types may treat .mjs as
    # application/octet-stream, which breaks strict module worker loading.
    location ~* \.mjs$ {
        types {
            application/javascript mjs;
        }
        try_files $uri =404;
    }

    # Same static build as /, but under a URL prefix. sub_filter aligns
    # <base href> with apps/web/index.html so ./assets and Router basename work.
    # Adjust the path in both sub_filter lines if you use a prefix other than /reportGenerate/.
    location = /reportGenerate {
        return 301 /reportGenerate/;
    }

    location ^~ /reportGenerate/ {
        alias /usr/share/nginx/html/;
        sub_filter '<base href="/" />' '<base href="/reportGenerate/" />';
        sub_filter_once off;
        sub_filter_types text/html;
        try_files $uri $uri/ /reportGenerate/index.html;
    }

    location ^~ /reportGenerate/api/ {
        proxy_pass http://api:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
